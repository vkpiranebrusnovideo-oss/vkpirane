<!DOCTYPE html>
<html lang="sk">
<head>
    <script>if (sessionStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';</script>
    <meta charset="UTF-8">
    <title>Admin Panel | VK Pirane</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ddd; }
        .list-item { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #002d5b; }
        input, select, button { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .grid-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body style="background:#f4f4f4; padding: 20px;">
    <div style="max-width: 1100px; margin: auto;">
        <h1>Admin Panel - VK Pirane Brusno</h1>
        <a href="index.html" onclick="sessionStorage.removeItem('isLoggedIn');">Odhlásiť sa / Späť na web</a>

        <div class="grid-admin" style="margin-top:20px;">
            <!-- ZÁPASY -->
            <div class="admin-section">
                <h2>Zápasy</h2>
                <input type="hidden" id="editMatchIndex" value="-1">
                <input type="text" id="team1" placeholder="Domáci">
                <input type="text" id="team2" placeholder="Hostia">
                <input type="text" id="score" placeholder="Skóre">
                <input type="date" id="date">
                <input type="time" id="time">
                <input type="text" id="alertText" placeholder="Zvýraznenie zápasu">
                <button id="saveMatchBtn" onclick="addMatch()" style="background:#002d5b; color:white; cursor:pointer; font-weight:bold;">ULOŽIŤ ZÁPAS</button>
                <div id="admin-matches-list"></div>
            </div>

            <!-- SÚPISKA -->
            <div class="admin-section">
                <h2>Súpiska tímu</h2>
                <input type="hidden" id="editPlayerIndex" value="-1">
                <input type="text" id="playerName" placeholder="Meno hráčky">
                <input type="number" id="playerNumber" placeholder="Číslo dresu">
                <input type="text" id="playerPosition" placeholder="Pozícia">
                <input type="text" id="playerImg" placeholder="URL fotky hráčky">
                <button id="savePlayerBtn" onclick="addPlayer()" style="background:#002d5b; color:white; cursor:pointer; font-weight:bold;">ULOŽIŤ HRÁČKU</button>
                <div id="admin-roster-list"></div>
            </div>

            <!-- FANSHOP -->
            <div class="admin-section">
                <h2>Fanshop</h2>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="prodName" placeholder="Názov produktu">
                <input type="text" id="prodPrice" placeholder="Cena">
                <input type="text" id="prodColor" placeholder="Farby (oddelené čiarkou)">
                <input type="text" id="prodImg" placeholder="URL fotiek (oddelené čiarkou)">
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; background:#eee; padding:10px; border-radius:5px;">
                    <label><input type="checkbox" class="size-check" value="XS"> XS</label>
                    <label><input type="checkbox" class="size-check" value="S"> S</label>
                    <label><input type="checkbox" class="size-check" value="M"> M</label>
                    <label><input type="checkbox" class="size-check" value="L"> L</label>
                    <label><input type="checkbox" class="size-check" value="XL"> XL</label>
                    <label><input type="checkbox" class="size-check" value="XXL"> XXL</label>
                </div>
                <button id="saveBtn" onclick="addProduct()" style="background:#002d5b; color:white; cursor:pointer; font-weight:bold;">ULOŽIŤ PRODUKT</button>
                <div id="admin-products-list"></div>
            </div>

            <!-- OBJEDNÁVKY -->
            <div class="admin-section">
                <h2>Prijaté objednávky</h2>
                <div id="admin-orders-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
